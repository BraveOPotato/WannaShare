# WannaSend coturn configuration (STUN + TURN).
#
# TURN is a LAST-RESORT relay: it only carries media when a direct peer-to-peer
# path cannot be found. Most transfers use STUN + direct connectivity and never
# touch this server. But TURN requires a host with a real, routable public IP —
# it cannot work from behind NAT without port forwarding.
#
# EDIT THE PLACEHOLDERS BELOW before deploying:
#   - external-ip           your server's public IPv4 (and :private if 1:1 NAT)
#   - user                  the shared TURN credential (user:password)
#   - realm                 your domain
#   - static-auth-secret    optional; only if you switch to REST/ephemeral creds

# --- Listening -------------------------------------------------------------
# STUN + TURN share port 3478. TLS/TURNS on 5349 is optional (needs certs).
listening-port=3478
#tls-listening-port=5349

# Bind to all interfaces inside the container; the host maps the ports.
listening-ip=0.0.0.0

# Your server's PUBLIC IP. Required so relayed candidates are reachable.
# For a cloud VM behind 1:1 NAT use: external-ip=PUBLIC_IP/PRIVATE_IP
external-ip=YOUR_PUBLIC_IP

# --- Relay port range ------------------------------------------------------
# UDP ports coturn hands out for relayed media. Keep it modest and OPEN THESE
# on your firewall / security group (and forward them if behind NAT).
min-port=49160
max-port=49200

# --- Authentication (long-term credential mechanism) -----------------------
# Simple shared username:password. The SAME values go in the frontend's
# VITE_TURN_USERNAME / VITE_TURN_CREDENTIAL.
lt-cred-mech
user=wannasend:CHANGE_ME_STRONG_SECRET
realm=wannasend.example.com

# If you later prefer time-limited REST credentials, remove `user=` above,
# uncomment the next two lines, and generate ephemeral creds server-side:
#use-auth-secret
#static-auth-secret=CHANGE_ME_LONG_RANDOM_HEX

# --- Hardening -------------------------------------------------------------
# Refuse to relay to multicast / loopback / private ranges (SSRF protection).
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Quotas to blunt abuse (adjust for your user count).
user-quota=12
total-quota=1200

# Logging to stdout so `docker logs` / compose captures it.
log-file=stdout
simple-log
#verbose

# Disable the CLI admin port; not needed for this deployment.
no-cli
